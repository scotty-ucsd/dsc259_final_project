<script>
    $(document).ready(function(){
      $("a.page-scroll").on('click', function(event) {
        if (this.hash !== "") {
          event.preventDefault();
          var hash = this.hash;
          $('html, body').animate({
            scrollTop: $(hash).offset().top - 70
          }, 800);
        }
      });
    });
</script>
